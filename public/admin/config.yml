backend:
  name: github
  repo: thehejjoking/my-blog
  branch: main
  auth_scope: repo
  client_id: Ov23lizz4TxjTdzPOmMk

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "posts"
    label: "Posts"
    folder: "src/pages/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }